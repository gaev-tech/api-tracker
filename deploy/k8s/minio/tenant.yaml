apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: minio
  namespace: minio
spec:
  image: minio/minio:RELEASE.2024-11-07T00-52-20Z
  configuration:
    name: minio-credentials
  pools:
    - name: pool-0
      servers: 1
      volumesPerServer: 1
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 20Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  requestAutoCert: false
---
# Job to create files-prod bucket
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-create-bucket
  namespace: minio
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc:latest
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: config.env
          command:
            - sh
            - -c
            - |
              set -e
              # Wait for MinIO to be ready
              until mc alias set local http://minio.minio:80 \
                $(grep MINIO_ROOT_USER /tmp/config | cut -d= -f2) \
                $(grep MINIO_ROOT_PASSWORD /tmp/config | cut -d= -f2) 2>/dev/null; do
                sleep 3
              done
              mc mb local/files-prod --ignore-existing
              # Lifecycle: delete soft-deleted files after 30 days
              mc ilm add --expiry-days 30 local/files-prod
              echo "Bucket files-prod created successfully"
          volumeMounts:
            - name: config
              mountPath: /tmp/config
              subPath: config.env
      volumes:
        - name: config
          secret:
            secretName: minio-credentials
