# PostgreSQL cluster for events-service (CNPG)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-events
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  bootstrap:
    initdb:
      database: events_db
      owner: events_user
      secret:
        name: events-db-credentials
  storage:
    storageClass: local-path
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
