---
# ConfigMap — openapi.yaml spec (keep in sync with contracts/openapi/openapi.yaml)
apiVersion: v1
kind: ConfigMap
metadata:
  name: openapi-spec
data:
  openapi.yaml: |
    openapi: 3.0.3
    info:
      title: api-tracker
      version: "1.0"
      description: API-tracker REST API. Base URL — https://api.apitracker.ru

    servers:
      - url: https://api.apitracker.ru
        description: Production

    components:
      securitySchemes:
        BearerAuth:
          type: http
          scheme: bearer
          description: JWT access token (RS256, 15 min) or PAT (prefix `pat_`).

      schemas:
        User:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              description: Display name
              example: Ivan
            email:
              type: string
              format: email
            theme:
              type: string
              enum: [light, dark]
            language:
              type: string
              description: ISO 639-1 code
              example: en
            parent_user_id:
              type: string
              format: uuid
              nullable: true
            is_active:
              type: boolean
            email_verified_at:
              type: string
              format: date-time
              nullable: true
            created_at:
              type: string
              format: date-time
          required: [id, name, email, theme, language, is_active, created_at]

        TokenPair:
          type: object
          properties:
            access_token:
              type: string
              description: JWT RS256 access token, valid 15 minutes.
            refresh_token:
              type: string
              description: Opaque refresh token, valid 30 days.
          required: [access_token, refresh_token]

        Error:
          type: object
          properties:
            error:
              type: object
              properties:
                code:
                  type: string
                  example: validation_error
                message:
                  type: string
                  example: invalid email format
                details:
                  type: object
                  nullable: true
              required: [code, message]
          required: [error]

        JWK:
          type: object
          description: JSON Web Key (RSA public key for RS256 verification).
          properties:
            kty:
              type: string
              example: RSA
            use:
              type: string
              example: sig
            alg:
              type: string
              example: RS256
            kid:
              type: string
              example: "1"
            n:
              type: string
              description: Base64url-encoded RSA modulus.
            e:
              type: string
              description: Base64url-encoded RSA public exponent.
          required: [kty, use, alg, kid, n, e]

        Project:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            description:
              type: string
            owner_id:
              type: string
              format: uuid
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
          required: [id, name, description, owner_id, created_at, updated_at]

        Team:
          type: object
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            description:
              type: string
            owner_id:
              type: string
              format: uuid
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
          required: [id, name, description, owner_id, created_at, updated_at]

        TaskPermissions:
          type: object
          properties:
            edit_title: { type: boolean }
            edit_description: { type: boolean }
            edit_tags: { type: boolean }
            edit_blockers: { type: boolean }
            edit_assignee: { type: boolean }
            edit_status: { type: boolean }
            share: { type: boolean }
            delete_task: { type: boolean }

        TaskDirectAccess:
          type: object
          properties:
            id: { type: string, format: uuid }
            task_id: { type: string, format: uuid }
            grantee_user_id: { type: string, format: uuid, nullable: true }
            grantee_team_id: { type: string, format: uuid, nullable: true }
            granted_by: { type: string, format: uuid }
            permissions: { $ref: "#/components/schemas/TaskPermissions" }
            created_at: { type: string, format: date-time }
            updated_at: { type: string, format: date-time }
          required: [id, task_id, granted_by, permissions, created_at, updated_at]

        ProjectPermissions:
          type: object
          properties:
            edit_title: { type: boolean }
            edit_description: { type: boolean }
            edit_tags: { type: boolean }
            edit_blockers: { type: boolean }
            edit_assignee: { type: boolean }
            edit_status: { type: boolean }
            share: { type: boolean }
            delete_task: { type: boolean }
            rename_project: { type: boolean }
            manage_members: { type: boolean }
            manage_automations: { type: boolean }
            manage_attachments: { type: boolean }
            delete_project: { type: boolean }
            import_tasks: { type: boolean }

        ProjectMember:
          type: object
          properties:
            user_id: { type: string, format: uuid }
            email: { type: string }
            name: { type: string }
            permissions: { $ref: "#/components/schemas/ProjectPermissions" }
            is_frozen_by_tariff: { type: boolean }
            joined_at: { type: string, format: date-time }
          required: [user_id, email, name, permissions, is_frozen_by_tariff, joined_at]

        ProjectTeamMember:
          type: object
          properties:
            team_id: { type: string, format: uuid }
            team_name: { type: string }
            permissions: { $ref: "#/components/schemas/ProjectPermissions" }
            is_frozen_in_project: { type: boolean }
            joined_at: { type: string, format: date-time }
          required: [team_id, team_name, permissions, is_frozen_in_project, joined_at]

        TeamMember:
          type: object
          properties:
            team_id: { type: string, format: uuid }
            user_id: { type: string, format: uuid }
            email: { type: string }
            name: { type: string }
            role: { type: string, enum: [admin, member] }
            joined_at: { type: string, format: date-time }
          required: [team_id, user_id, email, name, role, joined_at]

        Task:
          type: object
          properties:
            id:
              type: string
              format: uuid
            title:
              type: string
            description:
              type: string
            status:
              type: string
              enum: [opened, progress, closed]
            author_id:
              type: string
              format: uuid
            assignee_id:
              type: string
              format: uuid
              nullable: true
            tags:
              type: array
              items:
                type: string
            project_ids:
              type: array
              items:
                type: string
                format: uuid
            blocking_task_ids:
              type: array
              items:
                type: string
                format: uuid
            blocked_task_ids:
              type: array
              items:
                type: string
                format: uuid
            is_frozen_by_tariff:
              type: boolean
            created_at:
              type: string
              format: date-time
            updated_at:
              type: string
              format: date-time
          required: [id, title, description, status, author_id, tags, project_ids, blocking_task_ids, blocked_task_ids, is_frozen_by_tariff, created_at, updated_at]

        PAT:
          type: object
          description: Personal Access Token. Field `token` is non-null only in POST response (creation).
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
              example: CI script
            token:
              type: string
              nullable: true
              description: Full token value (pat_...). Only returned on creation, null otherwise.
            created_at:
              type: string
              format: date-time
            revoked_at:
              type: string
              format: date-time
              nullable: true
          required: [id, name, created_at]

        ProjectInvitation:
          type: object
          properties:
            id: { type: string, format: uuid }
            project_id: { type: string, format: uuid }
            invitee_user_id: { type: string, format: uuid, nullable: true }
            invitee_team_id: { type: string, format: uuid, nullable: true }
            invited_by: { type: string, format: uuid }
            permissions: { $ref: "#/components/schemas/ProjectPermissions" }
            status: { type: string }
            created_at: { type: string, format: date-time }
          required: [id, project_id, invited_by, permissions, status, created_at]

        TeamInvitation:
          type: object
          properties:
            id: { type: string, format: uuid }
            team_id: { type: string, format: uuid }
            invitee_user_id: { type: string, format: uuid }
            invited_by: { type: string, format: uuid }
            status: { type: string }
            created_at: { type: string, format: date-time }
          required: [id, team_id, invitee_user_id, invited_by, status, created_at]

        ProjectOwnershipTransfer:
          type: object
          properties:
            id: { type: string, format: uuid }
            project_id: { type: string, format: uuid }
            from_user_id: { type: string, format: uuid }
            to_user_id: { type: string, format: uuid }
            status: { type: string }
            created_at: { type: string, format: date-time }
          required: [id, project_id, from_user_id, to_user_id, status, created_at]

        TeamOwnershipTransfer:
          type: object
          properties:
            id: { type: string, format: uuid }
            team_id: { type: string, format: uuid }
            from_user_id: { type: string, format: uuid }
            to_user_id: { type: string, format: uuid }
            status: { type: string }
            created_at: { type: string, format: date-time }
          required: [id, team_id, from_user_id, to_user_id, status, created_at]

    security:
      - BearerAuth: []

    paths:
      /.well-known/jwks.json:
        get:
          summary: JWKS — RSA public key set for JWT verification
          operationId: getJWKS
          security: []
          tags: [Auth]
          responses:
            "200":
              description: JSON Web Key Set
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      keys:
                        type: array
                        items:
                          $ref: "#/components/schemas/JWK"
                    required: [keys]

      /auth/register:
        post:
          summary: Register — create account
          operationId: register
          security: []
          tags: [Auth]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                      minLength: 8
                  required: [email, password]
          responses:
            "201":
              description: Account created
              content:
                application/json:
                  schema:
                    allOf:
                      - $ref: "#/components/schemas/TokenPair"
                      - type: object
                        properties:
                          user:
                            $ref: "#/components/schemas/User"
                        required: [user]
            "400":
              description: Validation error
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"
            "409":
              description: Email already taken
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /auth/login:
        post:
          summary: Login — returns JWT access token + refresh token
          operationId: login
          security: []
          tags: [Auth]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    email:
                      type: string
                      format: email
                    password:
                      type: string
                  required: [email, password]
          responses:
            "200":
              description: Authenticated
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/TokenPair"
            "401":
              description: Invalid credentials or account deactivated
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /auth/refresh:
        post:
          summary: Refresh — rotate refresh token and get new access token
          operationId: refreshToken
          security: []
          tags: [Auth]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    refresh_token:
                      type: string
                  required: [refresh_token]
          responses:
            "200":
              description: New token pair issued
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/TokenPair"
            "401":
              description: Refresh token invalid, expired, or revoked
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /auth/logout:
        post:
          summary: Logout — revoke refresh token
          operationId: logout
          tags: [Auth]
          requestBody:
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    refresh_token:
                      type: string
          responses:
            "204":
              description: Logged out

      /auth/password/change:
        post:
          summary: Change password (authenticated)
          operationId: changePassword
          tags: [Auth]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    current_password:
                      type: string
                    new_password:
                      type: string
                      minLength: 8
                  required: [current_password, new_password]
          responses:
            "204":
              description: Password changed; all sessions revoked
            "401":
              description: Current password incorrect
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"
            "400":
              description: Validation error
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /users/me:
        get:
          summary: Get own profile
          operationId: getMe
          tags: [Users]
          responses:
            "200":
              description: User profile
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/User"
            "401":
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

        patch:
          summary: Update profile settings (name, theme, language)
          operationId: patchMe
          tags: [Users]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    name:
                      type: string
                      example: Ivan
                    theme:
                      type: string
                      enum: [light, dark]
                    language:
                      type: string
                      description: ISO 639-1 code
                      example: ru
          responses:
            "200":
              description: Updated profile
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/User"
            "401":
              description: Unauthorized
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

        delete:
          summary: Delete own account (irreversible)
          operationId: deleteMe
          tags: [Users]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    confirmation_email:
                      type: string
                      format: email
                  required: [confirmation_email]
          responses:
            "204":
              description: Account deleted
            "400":
              description: Confirmation email does not match
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /users/search:
        get:
          summary: Search users by email prefix
          operationId: searchUsers
          tags: [Users]
          parameters:
            - name: q
              in: query
              required: true
              schema:
                type: string
                minLength: 2
              description: Email prefix (min 2 chars)
            - name: limit
              in: query
              schema:
                type: integer
                default: 20
                maximum: 50
          responses:
            "200":
              description: Matching users (excludes caller, only verified & active)
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              format: uuid
                            name:
                              type: string
                            email:
                              type: string
                              format: email
                          required: [id, name, email]
                    required: [items]
            "400":
              description: Query too short
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /pats:
        get:
          summary: List own PATs
          operationId: listPATs
          tags: [PAT]
          responses:
            "200":
              description: List of PATs (token field is null)
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/PAT"
                    required: [items]

        post:
          summary: Create a new PAT
          operationId: createPAT
          tags: [PAT]
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    name:
                      type: string
                      example: CI script
                  required: [name]
          responses:
            "201":
              description: PAT created (token field contains the full value — only time it is shown)
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/PAT"
            "400":
              description: Validation error
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /pats/{id}:
        get:
          summary: Get PAT by ID
          operationId: getPAT
          tags: [PAT]
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
                format: uuid
          responses:
            "200":
              description: PAT details (token field is null)
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/PAT"
            "404":
              description: PAT not found
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

        patch:
          summary: Update PAT name
          operationId: updatePAT
          tags: [PAT]
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
                format: uuid
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    name:
                      type: string
                  required: [name]
          responses:
            "200":
              description: Updated PAT
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/PAT"
            "404":
              description: PAT not found or already revoked
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

        delete:
          summary: Revoke PAT (soft-delete)
          operationId: revokePAT
          tags: [PAT]
          parameters:
            - name: id
              in: path
              required: true
              schema:
                type: string
                format: uuid
          responses:
            "204":
              description: PAT revoked
            "404":
              description: PAT not found or already revoked
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /tasks/{id}/accesses:
        get:
          summary: List task direct accesses
          operationId: listTaskAccesses
          tags: [TaskAccesses]
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string, format: uuid }
          responses:
            "200":
              description: List of direct accesses
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/TaskDirectAccess"
                    required: [items]

        post:
          summary: Grant direct access to task
          operationId: grantTaskAccess
          tags: [TaskAccesses]
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string, format: uuid }
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    grantee_user_id: { type: string, format: uuid }
                    grantee_team_id: { type: string, format: uuid }
                    permissions: { $ref: "#/components/schemas/TaskPermissions" }
                  required: [permissions]
          responses:
            "201":
              description: Access granted
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/TaskDirectAccess"
            "409":
              description: Access already exists
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /tasks/{id}/accesses/{access_id}:
        patch:
          summary: Update task direct access permissions
          operationId: updateTaskAccess
          tags: [TaskAccesses]
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string, format: uuid }
            - name: access_id
              in: path
              required: true
              schema: { type: string, format: uuid }
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    permissions: { $ref: "#/components/schemas/TaskPermissions" }
                  required: [permissions]
          responses:
            "200":
              description: Access updated
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/TaskDirectAccess"
            "404":
              description: Access not found
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

        delete:
          summary: Revoke task direct access
          operationId: revokeTaskAccess
          tags: [TaskAccesses]
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string, format: uuid }
            - name: access_id
              in: path
              required: true
              schema: { type: string, format: uuid }
          responses:
            "204":
              description: Access revoked
            "404":
              description: Access not found
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /projects/{id}/members:
        get:
          summary: List project user members
          operationId: listProjectMembers
          tags: [ProjectMembers]
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string, format: uuid }
          responses:
            "200":
              description: List of project members
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProjectMember"
                    required: [items]

      /projects/{id}/members/{user_id}:
        patch:
          summary: Update project member permissions
          operationId: updateProjectMember
          tags: [ProjectMembers]
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string, format: uuid }
            - name: user_id
              in: path
              required: true
              schema: { type: string, format: uuid }
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    permissions: { $ref: "#/components/schemas/ProjectPermissions" }
                  required: [permissions]
          responses:
            "200":
              description: Member updated
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/ProjectMember"
            "404":
              description: Member not found
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

        delete:
          summary: Remove member from project
          operationId: removeProjectMember
          tags: [ProjectMembers]
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string, format: uuid }
            - name: user_id
              in: path
              required: true
              schema: { type: string, format: uuid }
          responses:
            "204":
              description: Member removed
            "404":
              description: Member not found
              content:
                application/json:
                  schema:
                    $ref: "#/components/schemas/Error"

      /projects/{id}/team-members:
        get:
          summary: List project team members
          operationId: listProjectTeamMembers
          tags: [ProjectMembers]
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string, format: uuid }
          responses:
            "200":
              description: List of project team members
              content:
                application/json:
                  schema:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProjectTeamMember"
                    required: [items]

      /projects/{id}/team-members/{team_id}:
        patch:
          summary: Update project team member permissions
          operationId: updateProjectTeamMember
          tags: [ProjectMembers]
          parameters:
            - name: id
              in: path
              required: true
              schema: { type: string, format: uuid }
            - name: team_id
              in: path
              required: true
              schema: { type: string, format: uuid }
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    permissions: { $ref: "#/components/schemas/ProjectPermissions" }
                  required: [permissions]
          responses:
            "200":
              description: Team member updated
              content:
