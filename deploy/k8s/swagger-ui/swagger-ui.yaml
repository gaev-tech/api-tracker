---
# Swagger UI — serves /docs
apiVersion: apps/v1
kind: Deployment
metadata:
  name: swagger-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: swagger-ui
  template:
    metadata:
      labels:
        app: swagger-ui
    spec:
      containers:
        - name: swagger-ui
          image: swaggerapi/swagger-ui:v5.17.14
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            # SWAGGER_JSON_URL is a browser-side URL — swagger-ui fetches it via HTTP.
            # api-gateway proxies /swagger/* → swagger-ui with prefix stripped,
            # so /swagger/openapi.yaml → /openapi.yaml (served from /openapi/ mount).
            - name: SWAGGER_JSON_URL
              value: /swagger/openapi.yaml
          volumeMounts:
            - name: openapi-spec
              mountPath: /usr/share/nginx/html/openapi.yaml
              subPath: openapi.yaml
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: openapi-spec
          configMap:
            name: openapi-spec

---
apiVersion: v1
kind: Service
metadata:
  name: swagger-ui
spec:
  selector:
    app: swagger-ui
  ports:
    - port: 8080
      targetPort: 8080
