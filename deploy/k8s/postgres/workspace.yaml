# PostgreSQL cluster for workspace-service (CNPG)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-workspace
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:17.2
  bootstrap:
    initdb:
      database: workspace_db
      owner: workspace_user
      secret:
        name: workspace-db-credentials
  storage:
    storageClass: local-path
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
