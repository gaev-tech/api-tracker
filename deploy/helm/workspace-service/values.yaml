replicaCount: 1

image:
  repository: ghcr.io/gaev-tech/api-tracker/workspace-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080
  grpcPort: 9090

hpa:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false

env:
  - name: PORT
    value: "8080"
  - name: GRPC_PORT
    value: "9090"
  - name: KAFKA_BROKERS
    value: "kafka-kafka-bootstrap.kafka.svc.cluster.local:9092"
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: workspace-db-credentials
        key: password
  - name: DB_HOST
    value: "citus-workspace-coordinator-rw"
  - name: DATABASE_URL
    value: "postgres://workspace_user:$(DB_PASSWORD)@citus-workspace-coordinator-rw:5432/workspace_db"

envFrom:
  configMapRef: ""
  secretRef: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
