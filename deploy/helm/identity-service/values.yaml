replicaCount: 1

image:
  repository: ghcr.io/gaev-tech/api-tracker/identity-service
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 8080
  grpcPort: 9090

hpa:
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

ingress:
  enabled: false

# JWT_PRIVATE_KEY comes from identity-jwt-secret via envFrom.secretRef below.
# DB_PASSWORD is read from identity-db-credentials and interpolated into DATABASE_URL
# using Kubernetes env var substitution syntax: $(VAR_NAME).
env:
  - name: PORT
    value: "8080"
  - name: JWT_ISSUER
    value: "api-tracker"
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: identity-db-credentials
        key: password
  - name: DATABASE_URL
    value: "postgres://identity_user:$(DB_PASSWORD)@postgres-identity-rw:5432/identity_db?sslmode=disable"

# JWT_PRIVATE_KEY is loaded from the identity-jwt-secret Secret (created in cd-helm.yml)
envFrom:
  configMapRef: ""
  secretRef: "identity-jwt-secret"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

serviceMonitor:
  enabled: false
  interval: 30s
  path: /metrics
