services:

  # ── PostgreSQL: identity-service ──────────────────────────────────────────
  postgres-identity:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-identity-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_user -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    # TODO: I-6 — backup policy настраивается при переходе на K8s/managed PostgreSQL

  # ── PostgreSQL: billing-service ───────────────────────────────────────────
  postgres-billing:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres-billing-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_user -d billing_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    # TODO: I-6 — backup policy настраивается при переходе на K8s/managed PostgreSQL

  # ── PostgreSQL: files-service ─────────────────────────────────────────────
  postgres-files:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: files_db
      POSTGRES_USER: files_user
      POSTGRES_PASSWORD: files_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres-files-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U files_user -d files_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    # TODO: I-6 — backup policy настраивается при переходе на K8s/managed PostgreSQL

  # ── Nginx API Gateway ────────────────────────────────────────────────────
  nginx-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - backend
    depends_on:
      postgres-identity:
        condition: service_healthy
      postgres-billing:
        condition: service_healthy
      postgres-files:
        condition: service_healthy
    # Upstream services (identity-service, workspace-service, etc.) return 502
    # until implemented. Added in subsequent tasks.

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - backend
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/postgresql.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - backend
    depends_on:
      - prometheus

  # ── Nginx Prometheus Exporter ─────────────────────────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3
    ports:
      - "9113:9113"
    command:
      - '--nginx.scrape-uri=http://nginx-gateway/stub_status'
    networks:
      - backend
    depends_on:
      - nginx-gateway

  # ── PostgreSQL Exporter — identity-service ────────────────────────────────
  postgres-exporter-identity:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://identity_user:identity_pass@postgres-identity:5432/identity_db?sslmode=disable
    networks:
      - backend
    depends_on:
      postgres-identity:
        condition: service_healthy

  # ── PostgreSQL Exporter — billing-service ─────────────────────────────────
  postgres-exporter-billing:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9188:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://billing_user:billing_pass@postgres-billing:5432/billing_db?sslmode=disable
    networks:
      - backend
    depends_on:
      postgres-billing:
        condition: service_healthy

  # ── PostgreSQL Exporter — files-service ───────────────────────────────────
  postgres-exporter-files:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9189:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://files_user:files_pass@postgres-files:5432/files_db?sslmode=disable
    networks:
      - backend
    depends_on:
      postgres-files:
        condition: service_healthy

  # ── Loki ──────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - backend
    command: -config.file=/etc/loki/local-config.yaml

  # ── Promtail ───────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.8
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - backend
    depends_on:
      - loki

  # TODO: I-20 — добавить: Citus (workspace/events/automations), Redis, Kafka, MinIO,
  #              все backend-сервисы, frontend

volumes:
  postgres-identity-data:
  postgres-billing-data:
  postgres-files-data:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  backend:
    driver: bridge
