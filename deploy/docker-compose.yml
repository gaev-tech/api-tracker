services:

  # ── PostgreSQL: identity-service ──────────────────────────────────────────
  postgres-identity:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: identity_user
      POSTGRES_PASSWORD: identity_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-identity-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U identity_user -d identity_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL: billing-service ───────────────────────────────────────────
  postgres-billing:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: billing_db
      POSTGRES_USER: billing_user
      POSTGRES_PASSWORD: billing_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres-billing-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billing_user -d billing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL: files-service ─────────────────────────────────────────────
  postgres-files:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: files_db
      POSTGRES_USER: files_user
      POSTGRES_PASSWORD: files_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres-files-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U files_user -d files_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL: ping service (reference) ─────────────────────────────────
  postgres-ping:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ping_db
      POSTGRES_USER: ping_user
      POSTGRES_PASSWORD: ping_pass
    ports:
      - "5435:5432"
    volumes:
      - postgres-ping-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ping_user -d ping_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Citus: workspace-service ──────────────────────────────────────────────
  citus-workspace:
    image: citusdata/citus:12.1
    environment:
      POSTGRES_DB: workspace_db
      POSTGRES_USER: workspace_user
      POSTGRES_PASSWORD: workspace_pass
    ports:
      - "5436:5432"
    volumes:
      - citus-workspace-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workspace_user -d workspace_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Citus: events-service ─────────────────────────────────────────────────
  citus-events:
    image: citusdata/citus:12.1
    environment:
      POSTGRES_DB: events_db
      POSTGRES_USER: events_user
      POSTGRES_PASSWORD: events_pass
    ports:
      - "5437:5432"
    volumes:
      - citus-events-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U events_user -d events_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Citus: automations-service ───────────────────────────────────────────
  citus-automations:
    image: citusdata/citus:12.1
    environment:
      POSTGRES_DB: automations_db
      POSTGRES_USER: automations_user
      POSTGRES_PASSWORD: automations_pass
    ports:
      - "5438:5432"
    volumes:
      - citus-automations-data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automations_user -d automations_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft, single broker for dev) ──────────────────────────────────
  kafka:
    image: apache/kafka:3.9.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: dev-cluster-id-0000001
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - backend
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── identity-service ──────────────────────────────────────────────────────
  identity-service:
    build:
      context: ../backend/services/identity-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://identity_user:identity_pass@postgres-identity:5432/identity_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      SENTRY_DSN: ""
    networks:
      - backend
    depends_on:
      postgres-identity:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── workspace-service ─────────────────────────────────────────────────────
  workspace-service:
    build:
      context: ../backend/services/workspace-service
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://workspace_user:workspace_pass@citus-workspace:5432/workspace_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      SENTRY_DSN: ""
    networks:
      - backend
    depends_on:
      citus-workspace:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── automations-service ───────────────────────────────────────────────────
  automations-service:
    build:
      context: ../backend/services/automations-service
      dockerfile: Dockerfile
    ports:
      - "8082:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://automations_user:automations_pass@citus-automations:5432/automations_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      SENTRY_DSN: ""
    networks:
      - backend
    depends_on:
      citus-automations:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── events-service ────────────────────────────────────────────────────────
  events-service:
    build:
      context: ../backend/services/events-service
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://events_user:events_pass@citus-events:5432/events_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      SENTRY_DSN: ""
    networks:
      - backend
    depends_on:
      citus-events:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── billing-service ───────────────────────────────────────────────────────
  billing-service:
    build:
      context: ../backend/services/billing-service
      dockerfile: Dockerfile
    ports:
      - "8084:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://billing_user:billing_pass@postgres-billing:5432/billing_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      SENTRY_DSN: ""
    networks:
      - backend
    depends_on:
      postgres-billing:
        condition: service_healthy
      kafka:
        condition: service_healthy

  # ── files-service ─────────────────────────────────────────────────────────
  files-service:
    build:
      context: ../backend/services/files-service
      dockerfile: Dockerfile
    ports:
      - "8085:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://files_user:files_pass@postgres-files:5432/files_db?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: files-dev
      SENTRY_DSN: ""
    networks:
      - backend
    depends_on:
      postgres-files:
        condition: service_healthy
      kafka:
        condition: service_healthy
      minio:
        condition: service_healthy

  # ── ping (reference service) ──────────────────────────────────────────────
  ping:
    build:
      context: ../backend/services/ping
      dockerfile: Dockerfile
    ports:
      - "8086:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://ping_user:ping_pass@postgres-ping:5432/ping_db?sslmode=disable
      SENTRY_DSN: ""
    networks:
      - backend
    depends_on:
      postgres-ping:
        condition: service_healthy

  # ── Nginx API Gateway ────────────────────────────────────────────────────
  nginx-gateway:
    build:
      context: ../backend/api-gateway
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - backend
    depends_on:
      - identity-service
      - workspace-service
      - billing-service
      - files-service
      - events-service

  # ── Frontend (Angular, hot-reload) ────────────────────────────────────────
  # TODO: I-20 — раскомментировать после инициализации Angular workspace в frontend/
  # frontend:
  #   image: node:20-alpine
  #   working_dir: /app
  #   volumes:
  #     - ../frontend:/app
  #   command: sh -c "npm install --registry https://registry.npmjs.org/ && npm run start -- --host 0.0.0.0 --poll 500"
  #   ports:
  #     - "4200:4200"
  #   networks:
  #     - backend

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - backend
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/postgresql.json
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - backend
    depends_on:
      - prometheus

  # ── Nginx Prometheus Exporter ─────────────────────────────────────────────
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.3
    ports:
      - "9113:9113"
    command:
      - '--nginx.scrape-uri=http://nginx-gateway/stub_status'
    networks:
      - backend
    depends_on:
      - nginx-gateway

  # ── PostgreSQL Exporter — identity-service ────────────────────────────────
  postgres-exporter-identity:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://identity_user:identity_pass@postgres-identity:5432/identity_db?sslmode=disable
    networks:
      - backend
    depends_on:
      postgres-identity:
        condition: service_healthy

  # ── PostgreSQL Exporter — billing-service ─────────────────────────────────
  postgres-exporter-billing:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9188:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://billing_user:billing_pass@postgres-billing:5432/billing_db?sslmode=disable
    networks:
      - backend
    depends_on:
      postgres-billing:
        condition: service_healthy

  # ── PostgreSQL Exporter — files-service ───────────────────────────────────
  postgres-exporter-files:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    ports:
      - "9189:9187"
    environment:
      DATA_SOURCE_NAME: postgresql://files_user:files_pass@postgres-files:5432/files_db?sslmode=disable
    networks:
      - backend
    depends_on:
      postgres-files:
        condition: service_healthy

  # ── Loki ──────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    networks:
      - backend
    command: -config.file=/etc/loki/local-config.yaml

  # ── Promtail ───────────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.8
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - backend
    depends_on:
      - loki

volumes:
  postgres-identity-data:
  postgres-billing-data:
  postgres-files-data:
  postgres-ping-data:
  citus-workspace-data:
  citus-events-data:
  citus-automations-data:
  kafka-data:
  redis-data:
  minio-data:
  prometheus-data:
  grafana-data:
  loki-data:

networks:
  backend:
    driver: bridge
