name: CD Helm Deploy

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'deploy/helm/**'
      - 'deploy/k8s/**'
      - '.github/workflows/cd-helm.yml'
  workflow_dispatch:

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          declare -A services=(
            [identity-service]=backend/services/identity-service
            [workspace-service]=backend/services/workspace-service
            [automations-service]=backend/services/automations-service
            [events-service]=backend/services/events-service
            [billing-service]=backend/services/billing-service
            [files-service]=backend/services/files-service
            [api-gateway]=backend/api-gateway
          )
          for service in "${!services[@]}"; do
            context="${services[$service]}"
            echo "Building $service from $context..."
            docker build -t "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:${{ github.sha }}" \
                         -t "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:latest" \
                         "$context"
            docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:${{ github.sha }}"
            docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:latest"
          done

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create identity-service JWT secret
        env:
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
        run: |
          printf '%s' "$JWT_PRIVATE_KEY" > /tmp/jwt_key.pem
          kubectl create secret generic identity-jwt-secret \
            --from-file=JWT_PRIVATE_KEY=/tmp/jwt_key.pem \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f /tmp/jwt_key.pem

      - name: Create ghcr image pull secret in production
        run: |
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy services to production
        run: |
          for chart in deploy/helm/*/; do
            service=$(basename "$chart")
            [ "$service" = "service-template" ] && continue
            echo "Deploying $service to production (image tag: ${{ github.sha }})..."
            helm upgrade --install "$service" "$chart" \
              --namespace production \
              --create-namespace \
              --set image.tag=${{ github.sha }} \
              --wait \
              --timeout 5m
          done
