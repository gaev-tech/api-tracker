name: CD Helm Deploy

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'deploy/helm/**'
      - 'deploy/k8s/**'
      - '.github/workflows/cd-helm.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  build:
    name: build / images
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - service: identity-service
            context: backend/services/identity-service
          - service: workspace-service
            context: backend/services/workspace-service
          - service: automations-service
            context: backend/services/automations-service
          - service: events-service
            context: backend/services/events-service
          - service: billing-service
            context: backend/services/billing-service
          - service: files-service
            context: backend/services/files-service
          - service: api-gateway
            context: backend/api-gateway
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/api-tracker/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/api-tracker/${{ matrix.service }}:latest

  setup-cluster:
    name: setup / cluster
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install ingress-nginx
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --version 4.11.3 \
            --set controller.kind=DaemonSet \
            --set controller.hostNetwork=true \
            --set controller.service.type=ClusterIP \
            --wait \
            --timeout 5m

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.16.2 \
            --set installCRDs=true \
            --wait \
            --timeout 5m

      - name: Remove ingress-nginx admission webhook
        run: kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found=true

      - name: Wait for cert-manager webhooks
        run: kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s

      - name: Apply ClusterIssuers
        run: kubectl apply -f deploy/k8s/

  deploy-staging:
    name: deploy / staging
    runs-on: ubuntu-latest
    needs: [setup-cluster, build]
    if: |
      always() &&
      needs.setup-cluster.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.environment == 'staging' || inputs.environment == 'production')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Clean up stuck releases in staging
        run: |
          for release in $(helm list -n staging --short 2>/dev/null); do
            status=$(helm status "$release" -n staging -o json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])")
            if [ "$status" = "failed" ] || [ "$status" = "pending-upgrade" ]; then
              echo "Uninstalling stuck release: $release"
              helm uninstall "$release" -n staging
            fi
          done

      - name: Deploy services to staging
        id: deploy_staging
        run: |
          IMAGE_TAG="${{ github.event_name == 'workflow_dispatch' && github.sha || 'latest' }}"
          for chart in deploy/helm/*/; do
            service=$(basename "$chart")
            [ "$service" = "service-template" ] && continue
            echo "Deploying $service to staging (image tag: $IMAGE_TAG)..."
            helm upgrade --install "$service" "$chart" \
              --namespace staging \
              --create-namespace \
              --set image.tag="$IMAGE_TAG" \
              --wait \
              --timeout 5m
          done

      - name: Diagnose on failure
        if: failure() && steps.deploy_staging.outcome == 'failure'
        run: |
          echo "=== Pods ==="
          kubectl get pods -n staging
          echo "=== Describe pods ==="
          kubectl describe pods -n staging
          echo "=== Events ==="
          kubectl get events -n staging --sort-by='.lastTimestamp'

  deploy-production:
    name: deploy / production
    runs-on: ubuntu-latest
    needs: [deploy-staging, build]
    if: |
      always() &&
      needs.deploy-staging.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production'))
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy services to production
        run: |
          IMAGE_TAG="${{ github.event_name == 'workflow_dispatch' && github.sha || 'latest' }}"
          for chart in deploy/helm/*/; do
            service=$(basename "$chart")
            [ "$service" = "service-template" ] && continue
            echo "Deploying $service to production (image tag: $IMAGE_TAG)..."
            helm upgrade --install "$service" "$chart" \
              --namespace production \
              --create-namespace \
              --set image.tag="$IMAGE_TAG" \
              --wait \
              --timeout 5m
          done
