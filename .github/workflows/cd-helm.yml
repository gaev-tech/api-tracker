name: CD Helm Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  setup-cluster:
    name: setup / cluster
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install ingress-nginx
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --version 4.11.3 \
            --set controller.service.type=LoadBalancer \
            --wait \
            --timeout 5m

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.16.2 \
            --set installCRDs=true \
            --wait \
            --timeout 5m

      - name: Wait for cert-manager webhooks
        run: kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s

      - name: Apply ClusterIssuers
        run: kubectl apply -f deploy/k8s/

  deploy-staging:
    name: deploy / staging
    runs-on: ubuntu-latest
    needs: setup-cluster
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy services to staging
        run: |
          for chart in deploy/helm/*/; do
            service=$(basename "$chart")
            # service-template is a reference chart, not a deployable release
            [ "$service" = "service-template" ] && continue
            echo "Deploying $service to staging..."
            helm upgrade --install "$service" "$chart" \
              --namespace staging \
              --create-namespace \
              --set image.tag=${{ github.sha }} \
              --wait \
              --timeout 5m
          done

  deploy-production:
    name: deploy / production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy services to production
        run: |
          for chart in deploy/helm/*/; do
            service=$(basename "$chart")
            [ "$service" = "service-template" ] && continue
            echo "Deploying $service to production..."
            helm upgrade --install "$service" "$chart" \
              --namespace production \
              --create-namespace \
              --set image.tag=${{ github.sha }} \
              --wait \
              --timeout 5m
          done
