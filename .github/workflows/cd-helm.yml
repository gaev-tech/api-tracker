name: CD Helm Deploy

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - 'deploy/helm/**'
      - 'deploy/k8s/**'
      - '.github/workflows/cd-helm.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  build:
    name: build / images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          declare -A services=(
            [identity-service]=backend/services/identity-service
            [workspace-service]=backend/services/workspace-service
            [automations-service]=backend/services/automations-service
            [events-service]=backend/services/events-service
            [billing-service]=backend/services/billing-service
            [files-service]=backend/services/files-service
            [api-gateway]=backend/api-gateway
          )
          for service in "${!services[@]}"; do
            context="${services[$service]}"
            echo "Building $service from $context..."
            docker build -t "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:${{ github.sha }}" \
                         -t "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:latest" \
                         "$context"
            docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:${{ github.sha }}"
            docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:latest"
          done

  deploy-staging:
    name: deploy / staging
    runs-on: ubuntu-latest
    needs: [build]
    if: |
      always() &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (github.event_name != 'workflow_dispatch' || inputs.environment == 'staging' || inputs.environment == 'production')
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create ghcr image pull secret in staging
        run: |
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace staging \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Clean up stuck releases in staging
        run: |
          for release in $(helm list -n staging --short 2>/dev/null); do
            status=$(helm status "$release" -n staging -o json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])")
            if [ "$status" = "failed" ] || [ "$status" = "pending-upgrade" ]; then
              echo "Uninstalling stuck release: $release"
              helm uninstall "$release" -n staging
            fi
          done

      - name: Deploy services to staging
        id: deploy_staging
        run: |
          for chart in deploy/helm/*/; do
            service=$(basename "$chart")
            [ "$service" = "service-template" ] && continue
            echo "Deploying $service to staging (image tag: ${{ github.sha }})..."
            helm upgrade --install "$service" "$chart" \
              --namespace staging \
              --create-namespace \
              --set image.tag=${{ github.sha }} \
              --wait \
              --timeout 5m
          done

      - name: Diagnose on failure
        if: failure() && steps.deploy_staging.outcome == 'failure'
        run: |
          echo "=== Pods ==="
          kubectl get pods -n staging
          echo "=== Describe pods ==="
          kubectl describe pods -n staging
          echo "=== Events ==="
          kubectl get events -n staging --sort-by='.lastTimestamp'

  deploy-production:
    name: deploy / production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: |
      always() &&
      needs.deploy-staging.result == 'success' &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production'))
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create ghcr image pull secret in production
        run: |
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy services to production
        run: |
          for chart in deploy/helm/*/; do
            service=$(basename "$chart")
            [ "$service" = "service-template" ] && continue
            echo "Deploying $service to production (image tag: ${{ github.sha }})..."
            helm upgrade --install "$service" "$chart" \
              --namespace production \
              --create-namespace \
              --set image.tag=${{ github.sha }} \
              --wait \
              --timeout 5m
          done
