name: CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    paths:
      - 'backend/**'
      - 'deploy/helm/**'
      - 'deploy/k8s/**'
      - '.github/workflows/cd-helm.yml'
  workflow_dispatch:

jobs:
  # ── Detect changed paths ────────────────────────────────────────────────────
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'deploy/k8s/**'

  # ── Build Docker images ─────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images
        run: |
          declare -A services=(
            [identity-service]=backend/services/identity-service
            [workspace-service]=backend/services/workspace-service
            [automations-service]=backend/services/automations-service
            [events-service]=backend/services/events-service
            [billing-service]=backend/services/billing-service
            [files-service]=backend/services/files-service
            [api-gateway]=backend/api-gateway
          )
          # Push only on main branch or tag — not on PRs
          PUSH=${{ github.event_name != 'pull_request' }}
          for service in "${!services[@]}"; do
            context="${services[$service]}"
            echo "=== $service ==="
            docker build \
              -t "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:${{ github.sha }}" \
              -t "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:latest" \
              "$context"
            if [ "$PUSH" = "true" ]; then
              docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:${{ github.sha }}"
              docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:latest"
            fi
          done

  # ── Cluster setup ───────────────────────────────────────────────────────────
  # Runs on push to main when deploy/k8s/** changed, or on workflow_dispatch.
  # Never runs on PRs (would modify production).
  setup:
    name: setup
    runs-on: ubuntu-latest
    needs: changes
    if: |
      github.event_name != 'pull_request' &&
      (needs.changes.outputs.infra == 'true' || github.event_name == 'workflow_dispatch')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Install ingress-nginx
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
          helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx \
            --create-namespace \
            --version 4.11.3 \
            --set controller.kind=DaemonSet \
            --set controller.hostNetwork=true \
            --set controller.service.type=ClusterIP \
            --wait \
            --timeout 5m

      - name: Install cert-manager
        run: |
          helm repo add jetstack https://charts.jetstack.io
          helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager \
            --create-namespace \
            --version v1.16.2 \
            --set installCRDs=true \
            --wait \
            --timeout 5m

      - name: Remove ingress-nginx admission webhook
        run: kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found=true

      - name: Wait for cert-manager webhooks
        run: kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s

      - name: Apply ClusterIssuers
        run: kubectl apply -f deploy/k8s/ --recursive=false

      - name: Install Strimzi Operator
        run: |
          helm repo add strimzi https://strimzi.io/charts/
          helm repo update
          # Remove orphaned RoleBindings that block Helm install on re-runs
          kubectl delete rolebinding \
            strimzi-cluster-operator \
            strimzi-cluster-operator-entity-operator-delegation \
            strimzi-cluster-operator-watched \
            -n kafka --ignore-not-found=true
          helm upgrade --install strimzi-kafka-operator strimzi/strimzi-kafka-operator \
            --namespace kafka \
            --create-namespace \
            --version 0.43.0 \
            --set watchNamespaces="{kafka}" \
            --wait \
            --timeout 5m

      - name: Deploy Kafka cluster and topics
        run: |
          kubectl apply -f deploy/k8s/kafka/kafka-cluster.yaml
          kubectl wait kafka/kafka -n kafka \
            --for=condition=Ready \
            --timeout=5m
          kubectl apply -f deploy/k8s/kafka/kafka-topics.yaml

      - name: Install CloudNativePG (CNPG) Operator
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts
          helm repo update
          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system \
            --create-namespace \
            --version 0.23.0 \
            --wait \
            --timeout 5m

      - name: Create PostgreSQL credentials secrets
        run: |
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic identity-db-credentials \
            --from-literal=username=identity_user \
            --from-literal=password=${{ secrets.IDENTITY_DB_PASSWORD }} \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic billing-db-credentials \
            --from-literal=username=billing_user \
            --from-literal=password=${{ secrets.BILLING_DB_PASSWORD }} \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic files-db-credentials \
            --from-literal=username=files_user \
            --from-literal=password=${{ secrets.FILES_DB_PASSWORD }} \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy PostgreSQL clusters
        run: |
          kubectl apply -f deploy/k8s/postgres/identity.yaml -n production
          kubectl apply -f deploy/k8s/postgres/billing.yaml -n production
          kubectl apply -f deploy/k8s/postgres/files.yaml -n production
          kubectl wait cluster/postgres-identity -n production \
            --for=condition=Ready --timeout=5m
          kubectl wait cluster/postgres-billing -n production \
            --for=condition=Ready --timeout=5m
          kubectl wait cluster/postgres-files -n production \
            --for=condition=Ready --timeout=5m

      - name: Create Citus DB credentials secrets
        run: |
          kubectl create secret generic workspace-db-credentials \
            --from-literal=username=workspace_user \
            --from-literal=password=${{ secrets.CITUS_WORKSPACE_PASSWORD }} \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic events-db-credentials \
            --from-literal=username=events_user \
            --from-literal=password=${{ secrets.CITUS_EVENTS_PASSWORD }} \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic automations-db-credentials \
            --from-literal=username=automations_user \
            --from-literal=password=${{ secrets.CITUS_AUTOMATIONS_PASSWORD }} \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Citus clusters
        run: |
          kubectl apply -f deploy/k8s/citus/workspace.yaml -n production
          kubectl apply -f deploy/k8s/citus/events.yaml -n production
          kubectl apply -f deploy/k8s/citus/automations.yaml -n production
          kubectl wait cluster/citus-workspace-coordinator -n production \
            --for=condition=Ready --timeout=5m
          kubectl wait cluster/citus-events-coordinator -n production \
            --for=condition=Ready --timeout=5m
          kubectl wait cluster/citus-automations-coordinator -n production \
            --for=condition=Ready --timeout=5m

      - name: Install OT-Container-Kit Redis Operator
        run: |
          helm repo add ot-helm https://ot-container-kit.github.io/helm-charts/
          helm repo update
          helm upgrade --install redis-operator ot-helm/redis-operator \
            --namespace ot-operators \
            --create-namespace \
            --version 0.15.1 \
            --wait \
            --timeout 5m

      - name: Create Redis credentials secret
        run: |
          kubectl create secret generic redis-credentials \
            --from-literal=password=${{ secrets.REDIS_PASSWORD }} \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy Redis
        run: |
          kubectl apply -f deploy/k8s/redis/redis.yaml -n production
          kubectl rollout status statefulset/redis-standalone -n production --timeout=2m

      - name: Install MinIO Operator
        run: |
          helm repo add minio-operator https://operator.min.io
          helm repo update
          helm upgrade --install minio-operator minio-operator/operator \
            --namespace minio-operator \
            --create-namespace \
            --version 6.0.4 \
            --wait \
            --timeout 5m

      - name: Create MinIO credentials secret
        run: |
          CONFIG_ENV="export MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}\nexport MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}"
          kubectl create namespace minio --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic minio-credentials \
            --from-literal=config.env="$(printf "$CONFIG_ENV")" \
            --namespace minio \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy MinIO Tenant
        run: |
          kubectl apply -f deploy/k8s/minio/tenant.yaml
          kubectl wait tenant/minio -n minio \
            --for=condition=Initialized --timeout=5m

      - name: Deploy Swagger UI
        run: |
          kubectl apply -f deploy/k8s/swagger-ui/swagger-ui.yaml -n production
          kubectl rollout status deployment/swagger-ui -n production --timeout=2m

  # ── Deploy application services ─────────────────────────────────────────────
  # Runs on main/tag after build succeeds and setup doesn't fail.
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [build, setup]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      needs.build.result == 'success' &&
      (needs.setup.result == 'success' || needs.setup.result == 'skipped')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Create identity-service JWT secret
        env:
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
        run: |
          printf '%s' "$JWT_PRIVATE_KEY" > /tmp/jwt_key.pem
          kubectl create secret generic identity-jwt-secret \
            --from-file=JWT_PRIVATE_KEY=/tmp/jwt_key.pem \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -
          rm -f /tmp/jwt_key.pem

      - name: Create ghcr image pull secret
        run: |
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace production \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy services to production
        run: |
          for chart in deploy/helm/*/; do
            service=$(basename "$chart")
            [ "$service" = "service-template" ] && continue
            echo "=== $service ==="
            helm upgrade --install "$service" "$chart" \
              --namespace production \
              --create-namespace \
              --set image.tag=${{ github.sha }} \
              --wait \
              --timeout 5m
          done
