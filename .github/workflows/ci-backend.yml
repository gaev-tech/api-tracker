name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'contracts/proto/**'
      - 'deploy/helm/**'
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/services/*/go.sum

      - name: Go vet — all services
        run: |
          for svc in identity-service workspace-service automations-service events-service billing-service files-service; do
            echo "=== $svc ==="
            (cd backend/services/$svc && go vet ./...)
          done

      - uses: azure/setup-helm@v4
        with:
          version: '3.16.0'

      - name: Helm lint
        run: |
          for chart in deploy/helm/*/; do
            echo "=== $(basename $chart) ==="
            helm lint "$chart"
            helm template test-release "$chart" > /dev/null
          done

      - uses: bufbuild/buf-action@v1
        with:
          version: '1.68.3'
          lint: true
          breaking: false
          push: false
          comment: false

  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/services/*/go.sum

      - name: Go build — all services
        run: |
          for svc in identity-service workspace-service automations-service events-service billing-service files-service; do
            echo "=== $svc ==="
            (cd backend/services/$svc && go build -o /tmp/ ./...)
          done

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/services/*/go.sum

      - name: Go test — all services
        run: |
          for svc in identity-service workspace-service automations-service events-service billing-service files-service; do
            echo "=== $svc ==="
            (cd backend/services/$svc && go test ./...)
          done

  deploy:
    name: deploy
    runs-on: ubuntu-latest
    needs: [lint, build, test]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push — all services
        run: |
          declare -A services=(
            [identity-service]=backend/services/identity-service
            [workspace-service]=backend/services/workspace-service
            [automations-service]=backend/services/automations-service
            [events-service]=backend/services/events-service
            [billing-service]=backend/services/billing-service
            [files-service]=backend/services/files-service
            [api-gateway]=backend/api-gateway
          )
          PUSH=${{ github.ref == 'refs/heads/main' }}
          for service in "${!services[@]}"; do
            context="${services[$service]}"
            echo "=== $service ==="
            docker build \
              -t "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:${{ github.sha }}" \
              -t "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:latest" \
              "$context"
            if [ "$PUSH" = "true" ]; then
              docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:${{ github.sha }}"
              docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:latest"
            fi
          done
