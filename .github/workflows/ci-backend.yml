name: CI Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  identity-service:
    name: identity-service
    runs-on: ubuntu-latest
    if: >
      contains(github.event.head_commit.modified, 'backend/services/identity-service') ||
      contains(github.event.head_commit.added, 'backend/services/identity-service') ||
      github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: backend/services/identity-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/services/identity-service/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  workspace-service:
