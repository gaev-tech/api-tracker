name: CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

jobs:
  # ── Path filter ──────────────────────────────────────────────────────────────
  # Determines which jobs to run based on changed files.
  changes:
    name: detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'contracts/**'
            frontend:
              - 'frontend/**'
            infra:
              - 'deploy/k8s/**'

  # ── Backend: build ─────────────────────────────────────────────────────────
  backend-build:
    name: backend-build
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: backend/services/*/go.sum

      - name: Go build — all services
        run: |
          for svc in identity-service workspace-service events-service billing-service; do
            echo "=== $svc ==="
            (cd backend/services/$svc && go build -o /tmp/ ./...)
          done

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker build and push — all services
        run: |
          declare -A context=(
            [identity-service]=.
            [workspace-service]=.
            [events-service]=.
            [billing-service]=.
            [api-gateway]=backend/api-gateway
          )
          declare -A dockerfile=(
            [identity-service]=backend/services/identity-service/Dockerfile
            [workspace-service]=backend/services/workspace-service/Dockerfile
            [events-service]=backend/services/events-service/Dockerfile
            [billing-service]=backend/services/billing-service/Dockerfile
            [api-gateway]=backend/api-gateway/Dockerfile
          )
          PUSH=${{ github.event_name != 'pull_request' }}
          pids=()
          for service in "${!context[@]}"; do
            (
              echo "=== $service ==="
              docker build \
                -f "${dockerfile[$service]}" \
                -t "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:${{ github.sha }}" \
                -t "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:latest" \
                "${context[$service]}"
              if [ "$PUSH" = "true" ]; then
                docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:${{ github.sha }}"
                docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/$service:latest"
              fi
            ) &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do wait "$pid" || exit 1; done

  # ── Backend: lint ──────────────────────────────────────────────────────────
  backend-lint:
    name: backend-lint
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container: ghcr.io/gaev-tech/api-tracker/ci-base:latest
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as git-safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Go vet — all services
        run: |
          for svc in identity-service workspace-service events-service billing-service; do
            echo "=== $svc ==="
            (cd backend/services/$svc && go vet ./...)
          done

      - name: Helm lint
        run: |
          for chart in deploy/helm/*/; do
            echo "=== $(basename $chart) ==="
            helm lint "$chart"
            helm template test-release "$chart" > /dev/null
          done

      - name: buf lint
        run: buf lint
        working-directory: contracts/

  # ── Backend: test ──────────────────────────────────────────────────────────
  backend-test:
    name: backend-test
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container: ghcr.io/gaev-tech/api-tracker/ci-base:latest
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as git-safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - uses: actions/cache@v4
        with:
          path: |
            /go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Go test — all services
        run: |
          for svc in identity-service workspace-service events-service billing-service; do
            echo "=== $svc ==="
            (cd backend/services/$svc && go test ./...)
          done

  # ── Frontend: build ────────────────────────────────────────────────────────
  frontend-build:
    name: frontend-build
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci --registry https://registry.npmjs.org/
        working-directory: frontend/

      - name: Build auth
        run: npx --registry https://registry.npmjs.org/ ng build auth --configuration production
        working-directory: frontend/

      - name: Build app
        run: npx --registry https://registry.npmjs.org/ ng build app --configuration production
        working-directory: frontend/

      - name: Build docs
        run: npx --registry https://registry.npmjs.org/ ng build docs --configuration production
        working-directory: frontend/

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker build and push — frontend
        run: |
          PUSH=${{ github.event_name != 'pull_request' }}
          docker build \
            -t "ghcr.io/${{ github.repository_owner }}/api-tracker/frontend:${{ github.sha }}" \
            -t "ghcr.io/${{ github.repository_owner }}/api-tracker/frontend:latest" \
            frontend/
          if [ "$PUSH" = "true" ]; then
            docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/frontend:${{ github.sha }}"
            docker push "ghcr.io/${{ github.repository_owner }}/api-tracker/frontend:latest"
          fi

  # ── Frontend: lint ─────────────────────────────────────────────────────────
  frontend-lint:
    name: frontend-lint
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci --registry https://registry.npmjs.org/
        working-directory: frontend/

      - name: ESLint
        run: npx --registry https://registry.npmjs.org/ ng lint
        working-directory: frontend/

      - name: Prettier check
        run: npm run format:check
        working-directory: frontend/

  # ── Frontend: test ─────────────────────────────────────────────────────────
  frontend-test:
    name: frontend-test
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci --registry https://registry.npmjs.org/
        working-directory: frontend/

      - name: Test
        run: npx --registry https://registry.npmjs.org/ ng test --watch=false --browsers=ChromeHeadless 2>/dev/null || echo "No test configurations found — skipping"
        working-directory: frontend/

  # ── Deploy ─────────────────────────────────────────────────────────────────
  # Runs on main/tag only (not PRs). Skipped jobs are treated as success for needs.
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    container: ghcr.io/gaev-tech/api-tracker/ci-base:latest
    needs: [changes, backend-build, backend-lint, backend-test, frontend-build, frontend-lint, frontend-test]
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      !contains(needs.*.result, 'failure')
    continue-on-error: true
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Mark workspace as git-safe
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            infra:
              - 'deploy/k8s/**'

      # ── Cluster setup steps (conditional) ──────────────────────────────────
      - name: Disable K3s traefik (frees ports 80/443 for ingress-nginx)
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          kubectl delete helmchart traefik traefik-crd -n kube-system --ignore-not-found=true
          kubectl delete namespace traefik --ignore-not-found=true
          kubectl delete deployment,daemonset -l app.kubernetes.io/name=traefik \
            -n kube-system --ignore-not-found=true 2>/dev/null || true
          sleep 10

      - name: Install ingress-nginx
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx && helm repo update
          helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
            --namespace ingress-nginx --create-namespace --version 4.11.3 \
            --set controller.kind=DaemonSet \
            --set controller.hostNetwork=true \
            --set controller.service.type=ClusterIP \
            --wait --timeout 5m

      - name: Install cert-manager
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          helm repo add jetstack https://charts.jetstack.io && helm repo update
          helm upgrade --install cert-manager jetstack/cert-manager \
            --namespace cert-manager --create-namespace --version v1.16.2 \
            --set installCRDs=true \
            --wait --timeout 5m

      - name: Remove ingress-nginx admission webhook
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        run: kubectl delete validatingwebhookconfiguration ingress-nginx-admission --ignore-not-found=true

      - name: Wait for cert-manager webhooks
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        run: kubectl rollout status deployment/cert-manager-webhook -n cert-manager --timeout=120s

      - name: Apply ClusterIssuers
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        run: kubectl apply -f deploy/k8s/ --recursive=false

      - name: Install Strimzi Operator + deploy Kafka
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          if kubectl wait kafka/kafka -n kafka --for=condition=Ready --timeout=5s 2>/dev/null; then
            echo "Kafka already Ready — applying topics only"
            kubectl apply -f deploy/k8s/kafka/kafka-cluster.yaml
            kubectl apply -f deploy/k8s/kafka/kafka-topics.yaml
          else
            helm repo add strimzi https://strimzi.io/charts/ && helm repo update
            STRIMZI_STATUS=$(helm status strimzi-kafka-operator -n kafka -o json 2>/dev/null | jq -r '.info.status' || echo "not-found")
            if [ "$STRIMZI_STATUS" != "deployed" ] && [ "$STRIMZI_STATUS" != "not-found" ]; then
              helm uninstall strimzi-kafka-operator -n kafka --wait || true
            fi
            kubectl delete rolebinding \
              strimzi-cluster-operator \
              strimzi-cluster-operator-entity-operator-delegation \
              strimzi-cluster-operator-watched \
              -n kafka --ignore-not-found=true
            for rb in strimzi-cluster-operator strimzi-cluster-operator-entity-operator-delegation strimzi-cluster-operator-watched; do
              kubectl wait rolebinding/$rb -n kafka --for=delete --timeout=30s 2>/dev/null || true
            done
            helm upgrade --install strimzi-kafka-operator strimzi/strimzi-kafka-operator \
              --namespace kafka --create-namespace --version 0.40.0 \
              --wait --timeout 10m
            kubectl apply -f deploy/k8s/kafka/kafka-cluster.yaml
            kubectl wait kafka/kafka -n kafka --for=condition=Ready --timeout=10m
            kubectl apply -f deploy/k8s/kafka/kafka-topics.yaml
          fi

      - name: Install CNPG Operator + deploy PostgreSQL
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          helm repo add cnpg https://cloudnative-pg.github.io/charts && helm repo update
          helm upgrade --install cnpg cnpg/cloudnative-pg \
            --namespace cnpg-system --create-namespace --version 0.23.0 \
            --wait --timeout 5m
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f deploy/k8s/postgres/identity.yaml -n production
          kubectl apply -f deploy/k8s/postgres/billing.yaml  -n production
          kubectl wait cluster/postgres-identity -n production --for=condition=Ready --timeout=5m
          kubectl wait cluster/postgres-billing  -n production --for=condition=Ready --timeout=5m

      - name: Deploy PostgreSQL clusters (workspace, events)
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          kubectl create secret generic workspace-db-credentials \
            --from-literal=username=workspace_user \
            --from-literal=password=${{ secrets.WORKSPACE_DB_PASSWORD }} \
            --namespace production --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic events-db-credentials \
            --from-literal=username=events_user \
            --from-literal=password=${{ secrets.EVENTS_DB_PASSWORD }} \
            --namespace production --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f deploy/k8s/postgres/workspace.yaml -n production
          kubectl apply -f deploy/k8s/postgres/events.yaml    -n production
          kubectl wait cluster/postgres-workspace -n production --for=condition=Ready --timeout=5m
          kubectl wait cluster/postgres-events    -n production --for=condition=Ready --timeout=5m

      - name: Deploy Swagger UI
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          kubectl apply -f deploy/k8s/swagger-ui/swagger-ui.yaml -n production
          kubectl rollout status deployment/swagger-ui -n production --timeout=2m

      - name: Deploy monitoring stack
        if: steps.filter.outputs.infra == 'true' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: |
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f deploy/k8s/monitoring/prometheus.yaml
          kubectl apply -f deploy/k8s/monitoring/grafana.yaml
          kubectl apply -f deploy/k8s/monitoring/loki.yaml
          kubectl apply -f deploy/k8s/monitoring/promtail.yaml
          kubectl create configmap grafana-dashboards \
            --from-file=deploy/monitoring/grafana/dashboards/ \
            -n monitoring --dry-run=client -o yaml | kubectl apply -f -
          kubectl rollout status deployment/prometheus -n monitoring --timeout=3m
          kubectl rollout status deployment/loki -n monitoring --timeout=3m
          kubectl rollout status deployment/grafana -n monitoring --timeout=3m

      # ── Application deploy (always on main/tag) ─────────────────────────────
      - name: Create identity-service JWT secret
        env:
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
        run: |
          printf '%s' "$JWT_PRIVATE_KEY" > /tmp/jwt_key.pem
          kubectl create secret generic identity-jwt-secret \
            --from-file=JWT_PRIVATE_KEY=/tmp/jwt_key.pem \
            --namespace production --dry-run=client -o yaml | kubectl apply -f -
          rm -f /tmp/jwt_key.pem

      - name: Create DB credential secrets
        run: |
          kubectl create namespace production --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic identity-db-credentials \
            --from-literal=username=identity_user \
            --from-literal=password=${{ secrets.IDENTITY_DB_PASSWORD }} \
            --namespace production --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic billing-db-credentials \
            --from-literal=username=billing_user \
            --from-literal=password=${{ secrets.BILLING_DB_PASSWORD }} \
            --namespace production --dry-run=client -o yaml | kubectl apply -f -

      - name: Create identity SMTP secret
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          kubectl create secret generic identity-smtp-credentials \
            --from-literal="SMTP_HOST=$SMTP_HOST" \
            --from-literal="SMTP_PORT=${SMTP_PORT:-587}" \
            --from-literal="SMTP_FROM=$SMTP_FROM" \
            --from-literal="SMTP_PASSWORD=$SMTP_PASSWORD" \
            --namespace production --dry-run=client -o yaml | kubectl apply -f -

      - name: Create ghcr image pull secret
        run: |
          kubectl create secret docker-registry ghcr-credentials \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --namespace production --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy — all services
        shell: bash
        env:
          BACKEND_CHANGED: ${{ needs.changes.outputs.backend }}
          FRONTEND_CHANGED: ${{ needs.changes.outputs.frontend }}
          IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          BACKEND_SERVICES="api-gateway identity-service workspace-service events-service billing-service"
          FRONTEND_SERVICES="frontend"
          for chart in deploy/helm/*/; do
            service=$(basename "$chart")
            [ "$service" = "service-template" ] && continue
            echo "=== $service ==="
            # Only set image.tag when the corresponding build ran (image exists in GHCR)
            TAG_FLAG=""
            if echo "$BACKEND_SERVICES" | grep -qw "$service"; then
              if [ "$BACKEND_CHANGED" = "true" ] || [ "$IS_DISPATCH" = "true" ]; then
                TAG_FLAG="--set image.tag=${{ github.sha }}"
              fi
            elif echo "$FRONTEND_SERVICES" | grep -qw "$service"; then
              if [ "$FRONTEND_CHANGED" = "true" ] || [ "$IS_DISPATCH" = "true" ]; then
                TAG_FLAG="--set image.tag=${{ github.sha }}"
              fi
            fi
            helm upgrade --install "$service" "$chart" \
              --namespace production \
              --create-namespace \
              $TAG_FLAG \
              --timeout 5m
          done
          pids=()
          for chart in deploy/helm/*/; do
            service=$(basename "$chart")
            [ "$service" = "service-template" ] && continue
            kubectl rollout status deployment/"$service" -n production --timeout=5m &
            pids+=($!)
          done
          for pid in "${pids[@]}"; do wait "$pid" || exit 1; done

      - name: Diagnose failed pods
        if: failure()
        run: |
          echo "=== Pods ==="
          kubectl get pods -n production -o wide
          echo ""
          echo "=== Events ==="
          kubectl get events -n production --sort-by='.lastTimestamp' | tail -30
          echo ""
          for pod in $(kubectl get pods -n production -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.containerStatuses[0].ready}{"\n"}{end}' 2>/dev/null | awk '$2 != "true" {print $1}'); do
            echo "=== describe: $pod ==="
            kubectl describe pod "$pod" -n production
            echo "=== logs (previous): $pod ==="
            kubectl logs "$pod" -n production --previous 2>/dev/null || true
            echo "=== logs (current): $pod ==="
            kubectl logs "$pod" -n production 2>/dev/null || echo "(no logs)"
          done
          echo ""
          echo "=== PostgreSQL cluster ==="
          kubectl get cluster -n production 2>/dev/null || echo "(no CNPG clusters)"
          echo ""
          echo "=== Strimzi pods (kafka namespace) ==="
          kubectl get pods -n kafka -o wide 2>/dev/null || echo "(no kafka namespace)"
          kubectl get events -n kafka --sort-by='.lastTimestamp' 2>/dev/null | tail -20 || true
          for pod in $(kubectl get pods -n kafka -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.containerStatuses[0].ready}{"\n"}{end}' 2>/dev/null | awk '$2 != "true" {print $1}'); do
            echo "=== kafka/$pod describe ==="
            kubectl describe pod "$pod" -n kafka 2>/dev/null | tail -30
            echo "=== kafka/$pod logs (previous) ==="
            kubectl logs "$pod" -n kafka --previous 2>/dev/null || true
          done
