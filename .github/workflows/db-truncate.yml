name: DB Truncate
on:
  workflow_dispatch:
jobs:
  truncate:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Truncate identity-service DB
        run: |
          POD=$(kubectl get pods -n production -l cnpg.io/cluster=postgres-identity,role=primary -o jsonpath='{.items[0].metadata.name}')
          echo "Pod: $POD"
          kubectl exec -n production $POD -- psql -U identity_user -d identity_db -c "
            TRUNCATE TABLE refresh_tokens CASCADE;
            TRUNCATE TABLE users CASCADE;
          "
