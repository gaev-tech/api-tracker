name: Diagnose
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: api-gateway pods
        run: kubectl get pods -n production -l app=api-gateway -o wide

      - name: api-gateway logs
        run: kubectl logs -n production -l app=api-gateway --tail=50 --prefix=true 2>&1 || true

      - name: api-gateway previous logs
        run: kubectl logs -n production -l app=api-gateway --tail=50 --prefix=true --previous 2>&1 || true

      - name: api-gateway describe
        run: kubectl describe pods -n production -l app=api-gateway

      - name: api-gateway helm state
        run: |
          kubectl get secret -n production -l owner=helm,name=api-gateway --sort-by='.metadata.creationTimestamp' | tail -5

      - name: Check nginx.conf inside pod and listening ports
        run: |
          POD=$(kubectl get pods -n production -l app=api-gateway -o jsonpath='{.items[0].metadata.name}')
          echo "=== /etc/nginx/nginx.conf ==="
          kubectl exec -n production $POD -- cat /etc/nginx/nginx.conf
          echo "=== listening ports ==="
          kubectl exec -n production $POD -- sh -c 'ss -tlnp 2>/dev/null || netstat -tlnp 2>/dev/null || cat /proc/net/tcp'
          echo "=== curl healthz from inside ==="
          kubectl exec -n production $POD -- wget -qO- http://127.0.0.1/healthz

      - name: Check ingress and service endpoints
        run: |
          echo "=== Ingress ==="
          kubectl get ingress -n production api-gateway -o yaml
          echo "=== Service ==="
          kubectl get service -n production api-gateway -o yaml
          echo "=== Endpoints ==="
          kubectl get endpoints -n production api-gateway -o yaml

      - name: Why is ingress-nginx Pending
        run: |
          kubectl describe pods -n ingress-nginx 2>&1 | grep -A 20 "Events:"
          kubectl get nodes -o wide
          kubectl describe nodes 2>&1 | grep -E "(Taints|Allocatable|cpu:|memory:)" | head -20

      - name: Test connectivity from inside cluster
        run: |
          SVC_IP=$(kubectl get service -n production api-gateway -o jsonpath='{.spec.clusterIP}')
          echo "api-gateway ClusterIP: $SVC_IP"
          # try from swagger-ui pod (if exists)
          SWPOD=$(kubectl get pods -n production -l app=swagger-ui -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$SWPOD" ]; then
            echo "=== curl from swagger-ui pod ==="
            kubectl exec -n production $SWPOD -- wget -qO- --timeout=3 http://$SVC_IP/healthz 2>&1 || true
          fi

      - name: ingress-nginx controller logs
        run: |
          kubectl logs -n ingress-nginx -l app.kubernetes.io/name=ingress-nginx --tail=30 2>&1 | grep -E "(api-gateway|api.apitracker|error|Error|upstream|404)" | tail -20 || true

      - name: ingress-nginx backend status
        run: |
          kubectl get pods -n ingress-nginx
          kubectl get ingress -n production -o wide

      - name: swagger-ui pod status and nginx config
        run: |
          echo "=== swagger-ui pods ==="
          kubectl get pods -n production -l app=swagger-ui -o wide
          SWPOD=$(kubectl get pods -n production -l app=swagger-ui -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$SWPOD" ]; then
            echo "=== swagger-ui logs ==="
            kubectl logs -n production $SWPOD --tail=20 2>&1 || true
            echo "=== swagger-ui /etc/nginx/nginx.conf ==="
            kubectl exec -n production $SWPOD -- cat /etc/nginx/nginx.conf 2>/dev/null || true
            echo "=== swagger-ui /etc/nginx/conf.d/ ==="
            kubectl exec -n production $SWPOD -- sh -c 'ls /etc/nginx/conf.d/ && cat /etc/nginx/conf.d/*.conf' 2>/dev/null || true
            echo "=== listening ports in swagger-ui pod ==="
            kubectl exec -n production $SWPOD -- sh -c 'ss -tlnp 2>/dev/null || cat /proc/net/tcp6 2>/dev/null || cat /proc/net/tcp' 2>/dev/null || true
            echo "=== curl http://127.0.0.1:8080/ from inside swagger-ui pod ==="
            kubectl exec -n production $SWPOD -- wget -qO- http://127.0.0.1:8080/ 2>&1 | head -5 || true
            echo "=== curl http://127.0.0.1:8080/swagger/ from inside swagger-ui pod ==="
            kubectl exec -n production $SWPOD -- wget -qO- http://127.0.0.1:8080/swagger/ 2>&1 | head -5 || true
          fi

      - name: identity-service state
        run: |
          echo "=== all resources in production ==="
          kubectl get all -n production
          echo "=== identity-service deployment describe ==="
          kubectl describe deployment identity-service -n production 2>&1 || true
          echo "=== pods with all labels ==="
          kubectl get pods -n production -o wide --show-labels 2>&1 || true

      - name: identity-service pods and env
        run: |
          echo "=== pods (app=identity-service) ==="
          kubectl get pods -n production -l app=identity-service -o wide 2>&1 || true
          echo "=== SMTP env vars ==="
          POD=$(kubectl get pods -n production -l app=identity-service -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          if [ -n "$POD" ]; then
            kubectl exec -n production $POD -- env | grep -E "SMTP|APP_BASE" || true
          else
            echo "no pod found"
          fi

      - name: identity-service logs (last 100 lines)
        run: |
          kubectl logs -n production -l app=identity-service --tail=100 --prefix=true 2>&1 || true
          echo "=== previous pod logs ==="
          kubectl logs -n production -l app=identity-service --tail=50 --prefix=true --previous 2>&1 || true

      - name: events
        run: kubectl get events -n production --sort-by='.lastTimestamp' | tail -30
